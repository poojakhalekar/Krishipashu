# Render.com Blueprint
# https://render.com/docs/blueprint-spec

databases:
  - name: krishipashu-db
    plan: free
    databaseName: livestock_management
    user: krishipashu

services:
  - type: web
    name: krishipashu
    runtime: node
    plan: free
    region: oregon
    buildCommand: |
      corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install --no-frozen-lockfile &&
      node build.production.mjs
    startCommand: |
      cd lib/db && npx drizzle-kit push --config ./drizzle.config.ts && cd ../.. && node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.20.2"
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: krishipashu-db
          property: connectionString
      - key: VITE_PUBLIC_BASE_URL
        value: ""
